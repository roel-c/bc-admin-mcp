name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build -buildvcs=false ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Install golangci-lint via `go install` so it is compiled with the Go
      # toolchain from go.mod. The golangci-lint-action's prebuilt binaries are
      # built against an older Go and fail to typecheck this module's newer Go
      # sources (exit code 3). Version pinned to match the Makefile
      # (GOLANGCI_LINT_VERSION) and .golangci.yml — bump all three together.
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Run golangci-lint
        run: golangci-lint run ./...
